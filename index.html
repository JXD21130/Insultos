<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Insultador</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:700px;
    text-align:center;
}

h1{
    font-size:3rem;
    margin-bottom:25px;
    letter-spacing:2px;
}

.card{
    background:#181818;
    border:1px solid #2a2a2a;
    border-radius:20px;
    padding:35px;
    min-height:180px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
}

#insulto{
    font-size:2rem;
    font-weight:bold;
}

#significado{
    font-size:1rem;
    color:#bdbdbd;
    max-width:500px;
    display:none;
    line-height:1.5;
}

.buttons{
    margin-top:25px;
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

button{
    border:none;
    background:white;
    color:black;
    padding:14px 28px;
    border-radius:14px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

#btnSignificado{
    display:none;
}
</style>
</head>
<body>

<div class="container">

    <h1>Insultador</h1>

    <div class="card">
        <div id="insulto">
            Pulsa el botón
        </div>

        <div id="significado"></div>
    </div>

    <div class="buttons">
        <button onclick="generarInsulto()">
            Generar insulto
        </button>

        <button id="btnSignificado" onclick="mostrarSignificado()">
            Ver significado
        </button>
    </div>

</div>

function generarInsulto(){

    insultoActual = insultos[Math.floor(Math.random() * insultos.length)];

    document.getElementById("significado").style.display = "none";

    document.getElementById("btnSignificado").style.display = "inline-block";
}

function mostrarSignificado(){

    const significado = document.getElementById("significado");
