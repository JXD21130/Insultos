    flex-direction:column;

#insulto{

#significado{

    line-height:1.5;
}

    margin-top:25px;
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

button{
    border:none;
    background:white;
    color:black;
    padding:14px 28px;
    border-radius:14px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

#btnSignificado{
    display:none;
}
</style>
